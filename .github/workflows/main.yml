name: Main

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Setup job workspace
        uses: ServerlessOpsIO/gha-setup-workspace@v2

      - name: Assume AWS Credentials
        uses: ServerlessOpsIO/gha-assume-aws-credentials@v1
        with:
          build_aws_account_id: ${{ secrets.AWS_CICD_ACCOUNT_ID }}

      - name: Install AWS SAM
        uses: aws-actions/setup-sam@v3

      - name: Validate template
        run: sam validate --lint

      - name: Validate template (stackset)
        run: sam validate --lint --template stacksets.yaml

      - name: Validate template (products template)
        run: sam validate --lint --template ./products/products.yaml

      - name: Validate template (client product)
        run: sam validate --lint --template ./products/client/template.yaml

      - name: Validate template (server product)
        run: sam validate --lint --template ./products/server/template.yaml

      - name: Synethsize StackSet templates
        run: |
          for _f in $(find . -type f -name 'stacksets.yaml'); do
            _dir="$(dirname $_f)/" \
            yq \
              -i \
              '(.. | select(has("localTemplateFile")) | .localTemplateFile) |= load_str(strenv(_dir) + .)' \
              $_f;
          done

      - name: Package Stackset template
        id: package-stackset
        uses: ServerlessOpsIO/gha-package-aws-sam@v1
        with:
          template_file: stacksets.yaml
          packaged_template_file: packaged-stacksets.yaml

      - name: Store Artifacts
        uses: ServerlessOpsIO/gha-store-artifacts@v2
        with:
          use_aws_sam: true

  deploy_authnz:
    name: Deploy Authnz Service
    needs:
      - build
    environment: production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Setup job workspace
        uses: ServerlessOpsIO/gha-setup-workspace@v2
        with:
          checkout_artifact: true

      - name: Assume AWS Credentials
        uses: ServerlessOpsIO/gha-assume-aws-credentials@v1
        with:
          build_aws_account_id: ${{ secrets.AWS_CICD_ACCOUNT_ID }}
          deploy_aws_account_id: ${{ secrets.DEPLOYMENT_ACCOUNT_ID }}

      - name: Deploy via AWS SAM
        uses: ServerlessOpsIO/gha-deploy-aws-sam@v1
        with:
          aws_account_id: ${{ secrets.DEPLOYMENT_ACCOUNT_ID }}
          env_json: ${{ toJson(env) }}
          vars_json: ${{ toJson(vars) }}
          secrets_json: ${{ toJson(secrets) }}

  deploy_stacksets:
    name: Deploy Authnz Products
    needs:
      - build
    environment: production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Setup job workspace
        uses: ServerlessOpsIO/gha-setup-workspace@v2
        with:
          checkout_artifact: true

      - name: Assume AWS Credentials
        uses: ServerlessOpsIO/gha-assume-aws-credentials@v1
        with:
          build_aws_account_id: ${{ secrets.AWS_CICD_ACCOUNT_ID }}
          deploy_aws_account_id: ${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }}

      - name: Sync product templates to S3
        id: sync-templates
        shell: bash
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }}
        run: aws s3 sync products/ s3://aws-service-catalog-templates-${AWS_ACCOUNT_ID}-${AWS_REGION}/serverlessops-api-authnz/${GITHUB_SHA}/

      - name: Deploy via AWS SAM
        uses: ServerlessOpsIO/gha-deploy-aws-sam@v1
        with:
          aws_account_id: ${{ secrets.AWS_MANAGEMENT_ACCOUNT_ID }}
          template_file: packaged-stacksets.yaml
          cfn_parameters_file: cfn-parameters-stacksets.json
          env_json: ${{ toJson(env) }}
          vars_json: ${{ toJson(vars) }}
          secrets_json: ${{ toJson(secrets) }}
